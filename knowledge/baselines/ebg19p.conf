# Approved redacted baseline — lab-asus-ebg19p-01 (ASUS ExpertWiFi)
# Source: ASUS ExpertWiFi EBG19P firmware 3.0.0.6.102_45537 export 2026-06-13 (approved by Tony)
# Redaction policy: WAN IPs, VPN keys, admin passwords removed.

device.model = EBG19P
device.firmware = 3.0.0.6.102_45537
device.timezone = Asia/Taipei

webui.https.enabled = true
webui.http.enabled = false
webui.wan_access = false
webui.port.https = 8443

ssh.enabled = true
ssh.port = 22
ssh.password_login = false
ssh.wan_access = false

firewall.enabled = true
firewall.wan_to_lan.default = drop
firewall.dos_protection = enabled

wps.enabled = false
upnp.enabled = false

vpn.server.enabled = true
vpn.server.type = wireguard
vpn.server.cipher = chacha20poly1305

sdn.guest.isolation = enabled
vlan.management.id = 1

poe.budget.watts = 123
poe.ports.poweron = 8

logging.remote.enabled = true
logging.remote.host = syslog.lab.asus.internal
logging.remote.port = 514

firmware.auto_check = enabled
