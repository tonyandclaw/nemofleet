# CI: `make lint` (bash -n + py_compile), `make test` (stdlib unittest), `make itest` (integration:
# the worker endpoint + dashboard started standalone with plain python3 + curl — no NemoClaw/
# OpenShell/NIM/device), and `make uitest` (jsdom render + i18n-completeness checks — the one
# real dependency this CI takes on, specifically because the "translate to English, half the app
# is still Chinese" bug kept shipping when this only ran manually/locally; see tests/ui/ui.test.mjs).
# The heavier e2e that needs live sandboxes stays on the dev box (make health / tests/e2e-*.sh).
name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # jsdom (tests/ui) requires Node ^20.19 || ^22.13 || >=24 — pin explicitly rather than trust
      # whatever the runner image's ambient default happens to be (that's what broke the first run).
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: make lint
      - run: make test
      - run: make itest
      - run: make uitest
