# CI: zero-dependency checks. `make lint` (bash -n + py_compile), `make test` (stdlib unittest),
# and `make itest` (integration: the worker endpoint + dashboard started standalone with plain
# python3 + curl — no NemoClaw/OpenShell/NIM/device). The heavier e2e that needs live sandboxes
# stays on the dev box (make health / tests/e2e-*.sh).
name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint
      - run: make test
      - run: make itest
