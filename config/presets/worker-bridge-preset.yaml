# 模板:%%WA_IP%% / %%WB_IP%% / %%WC_IP%% 是占位,boot-stack ensure_xagent 以 docker inspect
# 取得各 worker 當前 IP 渲染後 policy-add(token 占位 → sed 不會互相改寫)。
preset:
  name: worker-bridge
  description: "Hermes -> worker inbound fix endpoint (scoped; the ONLY cross-agent channel)"
network_policies:
  worker_bridge:
    name: worker_bridge
    endpoints:
      - host: %%WA_IP%%          # 節點 A = worker-a(zone A);boot-stack 渲染當前 IP
        port: 9099
        access: full
        tls: skip
        allowed_ips:
          - %%WA_IP%%/32
      - host: %%WB_IP%%          # 節點 B = worker-b(zone B)
        port: 9099
        access: full
        tls: skip
        allowed_ips:
          - %%WB_IP%%/32
      - host: %%WC_IP%%          # 節點 C = worker-c(zone C 治理)
        port: 9099
        access: full
        tls: skip
        allowed_ips:
          - %%WC_IP%%/32
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/bin/python3* }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/socat }
