rules:
  - id: nemofleet-c-command-injection
    languages: [c]
    severity: ERROR
    message: >-
      Untrusted input flows into a shell command (CWE-78). system()/popen()/execl* with a
      non-literal argument can execute attacker-controlled commands. Use execve-family with an
      argument vector, or strictly validate/allowlist the input.
    metadata:
      cwe: ["CWE-78: Improper Neutralization of Special Elements used in an OS Command"]
      references: ["https://cwe.mitre.org/data/definitions/78.html"]
      category: security
    mode: taint
    pattern-sources:
      - pattern: nvram_safe_get(...)
      - pattern: nvram_get(...)
      - pattern: websGetVar(...)
      - pattern: get_cgi(...)
      - pattern: getenv(...)
    pattern-sinks:
      - pattern: system($X)
      - pattern: popen($X, ...)
      - patterns:
          - pattern: $F(...)
          - metavariable-regex: {metavariable: $F, regex: '^(execl|execlp|execv|execvp|doSystem|eval_va)$'}
  - id: nemofleet-py-command-injection
    languages: [python]
    severity: ERROR
    message: >-
      Untrusted input flows into a shell command or eval (CWE-78). subprocess with shell=True,
      os.system, os.popen, and eval/exec run whatever string they're given — an attacker-controlled
      argument means attacker-controlled code. Pass an argument list (no shell=True), or validate/
      allowlist the input.
    metadata:
      cwe: ["CWE-78: Improper Neutralization of Special Elements used in an OS Command"]
      references: ["https://cwe.mitre.org/data/definitions/78.html"]
      category: security
    mode: taint
    pattern-sources:
      - pattern: request.args.get(...)
      - pattern: request.form.get(...)
      - pattern: request.json.get(...)
      - pattern: os.environ.get(...)
      - pattern: os.environ[...]
      - pattern: sys.argv[...]
      - pattern: input(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: os.system($CMD)
              - pattern: os.popen($CMD)
              - pattern: eval($CMD)
              - pattern: exec($CMD)
          - focus-metavariable: $CMD
      # focus-metavariable pins the sink check to $CMD (the actual command string/list) — without
      # it, "..." matches ANY argument, so a call like subprocess.run(cmd, shell=True, env=ENV)
      # where only ENV (built from os.environ, one of this rule's own sources — see ENV = dict(
      # os.environ, ...) in agent-dashboard.py) is "tainted" would false-positive on every such
      # call, even when $CMD itself is fully shlex.quote()d/allowlisted (confirmed this false-
      # positive against 10 real call sites in agent-dashboard.py before adding this).
      - patterns:
          - pattern-either:
              - pattern: subprocess.run($CMD, ..., shell=True, ...)
              - pattern: subprocess.call($CMD, ..., shell=True, ...)
              - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
          - focus-metavariable: $CMD
