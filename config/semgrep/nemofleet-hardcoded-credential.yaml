rules:
  - id: nemofleet-c-hardcoded-credential
    languages: [c]
    severity: WARNING
    message: >-
      Hardcoded credential (CWE-798). Secrets in firmware source are extractable by reverse
      engineering and shared across every unit. Load from secure storage (env/secrets), never source.
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      category: security
    patterns:
      - pattern-regex: '(?i)\b(password|passwd|secret|api[_-]?key|token|passphrase)\s*=\s*"[^"]{3,}"'
  - id: nemofleet-py-hardcoded-credential
    languages: [python]
    severity: WARNING
    message: >-
      Hardcoded credential (CWE-798). A literal secret in source is extractable from the repo/
      package and shared across every deploy. Load from env/secret storage, never source.
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      category: security
    patterns:
      - pattern-regex: '(?i)\b(password|passwd|secret|api[_-]?key|token|passphrase)\s*=\s*["''][^"'']{3,}["'']'
  - id: nemofleet-js-hardcoded-credential
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Hardcoded credential (CWE-798). A literal secret in source is extractable from the repo/
      bundle and shared across every deploy. Load from env/secret storage, never source.
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      category: security
    patterns:
      # JS/TS commonly assigns via `:` (object literal) as well as `=` (const/var) — cover both.
      - pattern-regex: '(?i)\b(password|passwd|secret|api[_-]?key|token|passphrase)\b\s*[:=]\s*["''][^"'']{3,}["'']'
  - id: nemofleet-bash-hardcoded-credential
    languages: [bash]
    severity: WARNING
    message: >-
      Hardcoded credential (CWE-798). A literal secret in a shell script is extractable from the
      repo and shared across every deploy. Load from env/secret storage, never source.
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      category: security
    patterns:
      # shell vars are commonly unquoted (PASSWORD=hunter2) as well as quoted — cover both, and
      # require no whitespace around `=` per shell assignment syntax (VAR = value is a syntax error).
      # excludes values that are themselves a variable/command-substitution reference
      # (TOKEN=$OTHER_VAR, TOKEN="$(cat file)", TOKEN="$OTHER") — this codebase's own scripts do
      # that constantly for path/token-file plumbing, and it isn't a hardcoded secret, just a
      # reference to one; the unquoted branch also excludes a leading quote so it can't swallow a
      # quoted "$..." value that the quoted branch correctly rejected.
      - pattern-regex: '(?i)\b(password|passwd|secret|api[_-]?key|token|passphrase)\w*=(["''](?!\$)[^"'']{3,}["'']|(?!["''$])\S{3,})'
  - id: nemofleet-pem-private-key
    languages: [generic]
    severity: ERROR
    message: >-
      A PEM private-key block is embedded in source (CWE-798/CWE-321). Router/firmware source
      shipping a baked-in private key means every unit shares the same key — extractable by
      reverse engineering the firmware, and unrevokable without a firmware update. Keys must be
      generated per-device at provisioning time, never committed to source.
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials", "CWE-321: Use of Hard-coded Cryptographic Key"]
      references: ["https://cwe.mitre.org/data/definitions/321.html"]
      category: security
    patterns:
      - pattern-regex: '-----BEGIN ((RSA|EC|DSA|OPENSSH|PGP) )?PRIVATE KEY-----'
  - id: nemofleet-cloud-token-pattern
    languages: [generic]
    severity: ERROR
    message: >-
      A structured cloud/API credential is embedded in source (CWE-798). Matched by the
      provider's own token format (not just a nearby variable name), so this is high-confidence —
      not a coincidental variable name. Rotate the credential (it's likely already been pushed to
      a repo/history) and load it from env/secret storage instead.
    metadata:
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      references: ["https://cwe.mitre.org/data/definitions/798.html"]
      category: security
    patterns:
      - pattern-either:
          - pattern-regex: 'AKIA[0-9A-Z]{16}'                    # AWS access key id
          - pattern-regex: 'gh[pousr]_[A-Za-z0-9]{36,}'           # GitHub personal/OAuth/app token
          - pattern-regex: 'xox[baprs]-[0-9A-Za-z-]{10,}'         # Slack token
          - pattern-regex: 'AIza[0-9A-Za-z_-]{35}'                # Google API key
